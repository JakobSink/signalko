<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8"/>
<title>Signalko · Vloge in pravice</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="/css/sk.css"/>
<style>
.roles-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;}
@media(max-width:820px){.roles-layout{grid-template-columns:1fr;}}

.role-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:4px;}
.role-item:hover{background:var(--up);}
.role-item.active{background:var(--accD);border-color:var(--acc);}
.role-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.role-name{font-size:13px;font-weight:600;flex:1;}
.role-count{font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace;}

/* Page group card */
.pg-card{border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
.pg-card.pg-on{border-color:rgba(79,142,247,.35);}
.pg-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--up);cursor:default;user-select:none;}
.pg-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
.pg-title{font-size:12px;font-weight:700;flex:1;text-transform:uppercase;letter-spacing:.06em;}
.pg-state{font-size:10px;font-weight:700;min-width:24px;text-align:right;transition:color .15s;}
.pg-state.on{color:var(--acc);}
.pg-state.off{color:var(--mut);}

/* Sub-perms */
.pg-body{padding:6px 16px 10px;}
.pg-body.pg-disabled{opacity:.45;pointer-events:none;}
.perm-row{display:flex;align-items:center;gap:14px;padding:7px 0;border-bottom:1px solid var(--border);}
.perm-row:last-child{border-bottom:none;}
.perm-info{flex:1;}
.perm-label{font-size:12px;color:var(--txt);line-height:1.4;}
.perm-code{font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.perm-state{font-size:10px;font-weight:600;min-width:24px;text-align:right;}
.perm-state.on{color:var(--acc);}
.perm-state.off{color:var(--mut);}

/* Toggle */
.tog{position:relative;width:38px;height:22px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;border-radius:22px;background:var(--border);transition:.18s;cursor:pointer;}
.tog-track::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;border-radius:50%;background:var(--sub);transition:.18s;}
.tog input:checked~.tog-track{background:var(--acc);}
.tog input:checked~.tog-track::before{transform:translateX(16px);background:#fff;}
.tog input:disabled~.tog-track{opacity:.4;cursor:not-allowed;}

/* Admin banner */
.admin-banner{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:10px;margin-bottom:20px;}
.admin-banner-title{font-size:13px;font-weight:700;color:var(--grn);}
.admin-banner-sub{font-size:11px;color:var(--mut);margin-top:1px;}
.perm-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;color:var(--acc);margin:3px;}
.perm-badge-cat{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.perm-badge-cat:first-child{margin-top:0;}

.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:64px 20px;color:var(--mut);font-size:12px;text-align:center;}
.editor-empty .ico{font-size:32px;opacity:.25;line-height:1;}

/* Count badge */
.cnt-badge{display:flex;align-items:baseline;gap:4px;font-family:'JetBrains Mono',monospace;}
.cnt-num{font-size:24px;font-weight:800;color:var(--acc);}
.cnt-total{font-size:11px;color:var(--mut);}
</style>
</head>
<body>
<div class="sk-layout">
  <aside class="sk-sidebar-col" id="sidebarHost"></aside>
  <main class="sk-main">
    <div class="sk-page-title">Vloge in pravice</div>
    <div class="sk-page-sub">Upravljanje uporabniških vlog in njihovih dovoljenj</div>

    <div class="roles-layout">

      <!-- LEFT: role list -->
      <div>
        <div class="sk-card sk-card-pad" style="margin-bottom:14px;">
          <div style="font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:600;">NOVA VLOGA</div>
          <div style="display:flex;gap:8px;">
            <input class="sk-input" id="newName" placeholder="Ime vloge…" style="flex:1;"
              onkeydown="if(event.key==='Enter')createRole()"/>
            <button class="sk-btn sk-btn-acc" onclick="createRole()" id="createBtn">+</button>
          </div>
        </div>
        <div id="roleList"><div class="sk-state-loading"><div class="sk-spin"></div>Nalaganje…</div></div>
      </div>

      <!-- RIGHT: editor -->
      <div class="sk-card" id="editor">
        <div class="editor-empty">
          <span class="ico">⊚</span>
          <div>Izberi vlogo na levi za urejanje pravic</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/css/sk.js"></script>
<script>
skRequirePerm('roles.manage');

// ── Page groups: vsaka stran ima pageCode (master toggle) + podpravice ────
// pageCode: null = ni vidnostnega togglea (admin/system strani)
const PAGE_GROUPS = [
  { label:'Izposoje',      icon:'📋', pageCode:'page.loans',    perms:['loans.view','loans.create','loans.return'] },
  { label:'Sredstva',      icon:'📦', pageCode:'page.assets',   perms:['assets.view','assets.edit'] },
  { label:'RFID tagi',     icon:'🏷️',  pageCode:'page.tags',     perms:['tags.view'] },
  { label:'Prisotnost',    icon:'🟢', pageCode:'page.presence', perms:['presence.view','presence.manage'] },
  { label:'Uporabniki',    icon:'👥', pageCode:'page.users',    perms:['users.view','users.manage'] },
  { label:'Bralniki',      icon:'📡', pageCode:'page.readers',  perms:['readers.view','readers.manage'] },
  { label:'Antene',        icon:'📶', pageCode:'page.antennas', perms:['antennas.view','antennas.manage'] },
  { label:'Cone',          icon:'🗺️',  pageCode:'page.zones',    perms:['zones.view','zones.manage'] },
  { label:'Vloge',         icon:'🔑', pageCode:'page.roles',    perms:['roles.manage'] },
];

let ALL_PERMS = [];
let ALL_ROLES = [];
let SEL       = null;

// Build label lookup from API
let LABEL = {};  // code -> label

async function load() {
  const [pr, rr] = await Promise.all([skGet('/api/Role/permissions'), skGet('/api/Role')]);
  if (pr.ok) {
    ALL_PERMS = pr.data || [];
    ALL_PERMS.forEach(p => { LABEL[p.code||p.Code] = p.label||p.Label||p.code||p.Code; });
  }
  if (rr.ok) ALL_ROLES = rr.data || [];
  renderList();
}

function isAdminRole(r)  { return !!(r.isAdmin||r.IsAdmin||(r.name||r.Name||'').toLowerCase()==='admin'); }
function isSystemRole(r) { return !!(r.isSystem||r.IsSystem||isAdminRole(r)||(r.name||r.Name||'').toLowerCase()==='user'); }

/* ── Role list ─────────────────────────────────────────────── */
function renderList() {
  const el = document.getElementById('roleList');
  if (!ALL_ROLES.length) { el.innerHTML = '<div style="color:var(--mut);font-size:12px;padding:8px 0;">Ni vlog.</div>'; return; }
  el.innerHTML = ALL_ROLES.map(r => {
    const perms = r.permissions||r.Permissions||[];
    const total = ALL_PERMS.length;
    const color = isAdminRole(r) ? 'var(--grn)' : isSystemRole(r) ? 'var(--acc)' : 'var(--org)';
    const sel   = SEL?.id === r.id;
    if (isAdminRole(r)) {
      return `<div class="role-item" style="cursor:default;opacity:.75;border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04);">
        <div class="role-dot" style="background:var(--grn);box-shadow:0 0 6px var(--grn);"></div>
        <div class="role-name" style="color:var(--grn);">${h(r.name||r.Name)}</div>
        <span style="font-size:10px;color:var(--grn);font-weight:700;">⊗ zaklenjeno</span>
      </div>`;
    }
    return `<div class="role-item${sel?' active':''}" onclick="selectRole(${r.id})">
      <div class="role-dot" style="background:${color};"></div>
      <div class="role-name">${h(r.name||r.Name)}</div>
      <span class="role-count">${perms.length}${total?'/'+total:''}</span>
    </div>`;
  }).join('');
}

/* ── Select ────────────────────────────────────────────────── */
function selectRole(id) {
  const role = ALL_ROLES.find(r => r.id === id);
  if (!role || isAdminRole(role)) return;
  SEL = role;
  renderList();
  renderEditor();
}

/* ── Editor ────────────────────────────────────────────────── */
function renderEditor() {
  const el = document.getElementById('editor');
  if (!SEL) {
    el.innerHTML = '<div class="editor-empty"><span class="ico">⊚</span><div>Izberi vlogo na levi za urejanje pravic</div></div>';
    return;
  }
  const r = SEL;

  // Admin: read-only
  if (isAdminRole(r)) {
    const cats = {};
    ALL_PERMS.forEach(p => { const c=p.category||p.Category||'Ostalo'; (cats[c]=cats[c]||[]).push(p); });
    const badges = Object.entries(cats).map(([cat,perms]) =>
      `<div class="perm-badge-cat">${h(cat)}</div>`+
      perms.map(p=>`<span class="perm-badge">✓ ${h(p.label||p.Label||p.code||p.Code)}</span>`).join('')
    ).join('');
    el.innerHTML = `<div class="sk-card-pad">
      <div class="admin-banner">
        <span style="font-size:20px;">⊚</span>
        <div><div class="admin-banner-title">Admin — vse pravice</div>
        <div class="admin-banner-sub">Ta vloga ima popoln dostop. Pravic ni mogoče urejati.</div></div>
      </div>${badges}</div>`;
    return;
  }

  // Editable
  const mySet    = new Set((r.permissions||r.Permissions||[]).map(String));
  const isSystem = isSystemRole(r);

  const groups = PAGE_GROUPS.map(g => buildGroup(g, mySet)).join('');

  el.innerHTML = `<div class="sk-card-pad">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;">
      ${!isSystem
        ? `<div class="sk-field" style="margin:0;flex:1;">
             <label style="font-size:10px;">IME VLOGE</label>
             <input class="sk-input" id="eName" value="${h(r.name||r.Name)}" style="margin-top:4px;"/>
           </div>`
        : `<div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;">${h(r.name||r.Name)}</div>`}
      <div class="cnt-badge" style="flex-shrink:0;text-align:right;">
        <span class="cnt-num" id="cntNum">${mySet.size}</span>
        <span class="cnt-total">/ ${ALL_PERMS.length}</span>
      </div>
    </div>
    ${groups}
    <div style="display:flex;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
      <button class="sk-btn sk-btn-acc sk-btn-full" id="saveBtn" onclick="save()">✓ Shrani</button>
      ${!isSystem ? `<button class="sk-btn sk-btn-red" onclick="del(${r.id})" title="Izbriši vlogo">🗑</button>` : ''}
    </div>
  </div>`;
}

function buildGroup(g, mySet) {
  const pageOn = g.pageCode ? mySet.has(g.pageCode) : true;  // no pageCode = always "accessible"
  const cardOn = pageOn;

  // header toggle (page visibility)
  const headerToggle = g.pageCode ? `
    <span class="perm-state ${pageOn?'on':'off'}" id="pgst_${CSS.escape(g.pageCode)}">${pageOn?'DA':'NE'}</span>
    <label class="tog">
      <input type="checkbox" data-pagecode="${h(g.pageCode)}" ${pageOn?'checked':''}
        onchange="togglePage(this)"/>
      <span class="tog-track"></span>
    </label>` : '';

  // sub-perms
  const rows = g.perms.map(code => {
    const on  = mySet.has(code);
    const lbl = LABEL[code] || code;
    return `<div class="perm-row">
      <div class="perm-info">
        <div class="perm-label">${h(lbl)}</div>
        <div class="perm-code">${h(code)}</div>
      </div>
      <span class="perm-state ${on?'on':'off'}">${on?'DA':'NE'}</span>
      <label class="tog">
        <input type="checkbox" data-code="${h(code)}" ${on?'checked':''}
          ${!pageOn?'disabled':''}
          onchange="togglePerm(this)"/>
        <span class="tog-track"></span>
      </label>
    </div>`;
  }).join('');

  return `<div class="pg-card ${cardOn?'pg-on':''}" id="pgcard_${g.pageCode||g.label.replace(/\s/g,'_')}">
    <div class="pg-header">
      <span class="pg-icon">${g.icon}</span>
      <span class="pg-title">${h(g.label)}</span>
      ${headerToggle}
    </div>
    <div class="pg-body ${!pageOn?'pg-disabled':''}" id="pgbody_${g.pageCode||g.label.replace(/\s/g,'_')}">${rows}</div>
  </div>`;
}

/* ── Toggle: page master switch ────────────────────────────── */
function togglePage(cb) {
  if (!SEL) return;
  const pageCode = cb.dataset.pagecode;
  const perms = new Set((SEL.permissions||SEL.Permissions||[]).map(String));

  if (cb.checked) {
    perms.add(pageCode);
  } else {
    // Page OFF → remove pageCode + all sub-perms for this group
    perms.delete(pageCode);
    const g = PAGE_GROUPS.find(x => x.pageCode === pageCode);
    if (g) g.perms.forEach(c => perms.delete(c));
  }

  SEL.permissions = [...perms];
  SEL.Permissions = SEL.permissions;

  // Update card visual
  const card   = cb.closest('.pg-card');
  const body   = card?.querySelector('.pg-body');
  const stEl   = card?.querySelector('.perm-state');
  const cardId = card?.id;

  if (card)  card.classList.toggle('pg-on', cb.checked);
  if (body)  body.classList.toggle('pg-disabled', !cb.checked);
  if (stEl)  { stEl.textContent = cb.checked?'DA':'NE'; stEl.className = 'perm-state '+(cb.checked?'on':'off'); }

  // Disable/enable sub-perm toggles and uncheck them if page goes off
  if (body) {
    body.querySelectorAll('input[data-code]').forEach(inp => {
      inp.disabled = !cb.checked;
      if (!cb.checked) {
        inp.checked = false;
        const row = inp.closest('.perm-row');
        if (row) {
          const st = row.querySelector('.perm-state');
          if (st) { st.textContent = 'NE'; st.className = 'perm-state off'; }
        }
      }
    });
  }

  updateCounter(perms.size);
  renderList();
}

/* ── Toggle: individual permission ────────────────────────── */
function togglePerm(cb) {
  if (!SEL) return;
  const perms = new Set((SEL.permissions||SEL.Permissions||[]).map(String));
  cb.checked ? perms.add(cb.dataset.code) : perms.delete(cb.dataset.code);
  SEL.permissions = [...perms];
  SEL.Permissions = SEL.permissions;

  const row = cb.closest('.perm-row');
  if (row) {
    const st = row.querySelector('.perm-state');
    if (st) { st.textContent = cb.checked?'DA':'NE'; st.className = 'perm-state '+(cb.checked?'on':'off'); }
  }

  updateCounter(perms.size);
  renderList();
}

function updateCounter(n) {
  const el = document.getElementById('cntNum');
  if (el) el.textContent = n;
}

/* ── Create ────────────────────────────────────────────────── */
async function createRole() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { skToast('Vnesi ime vloge.', 'error'); return; }
  const btn = document.getElementById('createBtn');
  skBtnLoading(btn, true, '+');
  const r = await skPost('/api/Role', { name, permissions: [] });
  skBtnLoading(btn, false, '+');
  if (!r.ok) { skToast(`Napaka ${r.status}: ${r.data?.message||'Neznana napaka'}`, 'error'); return; }
  document.getElementById('newName').value = '';
  ALL_ROLES.push(r.data);
  SEL = r.data;
  renderList();
  renderEditor();
  skToast('Vloga ustvarjena!');
}

/* ── Save ──────────────────────────────────────────────────── */
async function save() {
  if (!SEL) return;
  const btn  = document.getElementById('saveBtn');
  const name = document.getElementById('eName')?.value.trim() || SEL.name||SEL.Name;
  const perms = SEL.permissions||SEL.Permissions||[];
  skBtnLoading(btn, true, '✓ Shrani');
  const r = await skPut(`/api/Role/${SEL.id}`, { name, permissions: perms });
  skBtnLoading(btn, false, '✓ Shrani');
  if (!r.ok) { skToast(`Napaka ${r.status}: ${r.data?.message||'Neznana napaka'}`, 'error'); return; }
  const idx = ALL_ROLES.findIndex(x => x.id === SEL.id);
  if (idx >= 0) { ALL_ROLES[idx] = { ...ALL_ROLES[idx], ...r.data, permissions: perms }; SEL = ALL_ROLES[idx]; }
  renderList();
  skToast('Shranjeno!');
}

/* ── Delete ────────────────────────────────────────────────── */
async function del(id) {
  if (!confirm('Izbriši to vlogo? Tega ni mogoče razveljaviti.')) return;
  const r = await skDel(`/api/Role/${id}`);
  if (!r.ok) { skToast(`Napaka ${r.status}: ${r.data?.message||'Neznana napaka'}`, 'error'); return; }
  ALL_ROLES = ALL_ROLES.filter(x => x.id !== id);
  SEL = null;
  renderList();
  renderEditor();
  skToast('Vloga izbrisana.', 'warning');
}

function h(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
