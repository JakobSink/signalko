<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8"/>
<title>Signalko · Vloge in pravice</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="/css/sk.css"/>
<style>
.roles-layout{display:grid;grid-template-columns:270px 1fr;gap:20px;align-items:start;}
@media(max-width:820px){.roles-layout{grid-template-columns:1fr;}}

.role-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;transition:background .12s;border:1px solid transparent;margin-bottom:4px;}
.role-item:hover{background:var(--up);}
.role-item.active{background:var(--accD);border-color:var(--acc);}
.role-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.role-name{font-size:13px;font-weight:600;flex:1;}
.role-pct{font-size:10px;color:var(--mut);}

.perm-cat{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.perm-cat:first-child{margin-top:0;}
.perm-row{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--border);}
.perm-row:last-child{border-bottom:none;}
.perm-info{flex:1;}
.perm-label{font-size:12px;color:var(--txt);line-height:1.4;}
.perm-code{font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace;margin-top:1px;}

.tog{position:relative;width:38px;height:22px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;position:absolute;}
.tog-track{position:absolute;inset:0;border-radius:22px;background:var(--border);transition:.18s;cursor:pointer;}
.tog-track::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;border-radius:50%;background:var(--sub);transition:.18s;}
.tog input:checked~.tog-track{background:var(--acc);}
.tog input:checked~.tog-track::before{transform:translateX(16px);background:#fff;}
.tog input:disabled~.tog-track{opacity:.45;cursor:not-allowed;}

.lock-notice{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mut);background:var(--up);border-radius:8px;padding:10px 14px;margin-bottom:16px;}

.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:64px 20px;color:var(--mut);font-size:12px;text-align:center;}
.editor-empty .ico{font-size:36px;opacity:.3;}
</style>
</head>
<body>
<div class="sk-layout">
  <aside class="sk-sidebar-col" id="sidebarHost"></aside>
  <main class="sk-main">
    <div class="sk-page-title">Vloge in pravice</div>
    <div class="sk-page-sub">Upravljanje uporabniških vlog in njihovih dovoljenj</div>

    <div class="roles-layout">

      <!-- LEFT -->
      <div>
        <div class="sk-card sk-card-pad" style="margin-bottom:14px;">
          <div style="font-size:11px;color:var(--mut);margin-bottom:8px;font-weight:600;">NOVA VLOGA</div>
          <div style="display:flex;gap:8px;">
            <input class="sk-input" id="newName" placeholder="Ime vloge…" style="flex:1;"
              onkeydown="if(event.key==='Enter')createRole()"/>
            <button class="sk-btn sk-btn-acc" onclick="createRole()" id="createBtn">+</button>
          </div>
        </div>
        <div id="roleList"><div class="sk-state-loading"><div class="sk-spin"></div>Nalaganje…</div></div>
      </div>

      <!-- RIGHT -->
      <div class="sk-card" id="editor">
        <div class="editor-empty">
          <span class="ico">🔐</span>
          <div>Izberi vlogo na levi za urejanje pravic</div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/css/sk.js"></script>
<script>
skRequireAdmin();

let ALL_PERMS = [];
let ALL_ROLES = [];
let SEL       = null;

async function load() {
  const [pr, rr] = await Promise.all([skGet('/api/Role/permissions'), skGet('/api/Role')]);
  if (pr.ok) ALL_PERMS = pr.data || [];
  if (rr.ok) ALL_ROLES = rr.data || [];
  renderList();
}

/* ── List ──────────────────────────────────────────────────── */
function renderList() {
  const el = document.getElementById('roleList');
  if (!ALL_ROLES.length) { el.innerHTML = '<div style="color:var(--mut);font-size:12px;padding:8px 0;">Ni vlog.</div>'; return; }
  el.innerHTML = ALL_ROLES.map(r => {
    const perms = r.permissions || r.Permissions || [];
    const pct   = ALL_PERMS.length ? Math.round(perms.length / ALL_PERMS.length * 100) : 0;
    const color = r.isAdmin ? 'var(--grn)' : r.isSystem ? 'var(--acc)' : 'var(--org)';
    const sel   = SEL?.id === r.id;
    return `<div class="role-item${sel?' active':''}" onclick="select(${r.id})" style="cursor:${r.isAdmin?'default':'pointer'}">
      <div class="role-dot" style="background:${color};${r.isAdmin?'box-shadow:0 0 6px var(--grn);':''}"></div>
      <div class="role-name">${h(r.name||r.Name)}</div>
      ${r.isAdmin
        ? '<span style="font-size:10px;color:var(--grn);">🔒 Admin</span>'
        : `<span class="role-pct">${pct}%</span>`}
    </div>`;
  }).join('');
}

/* ── Select ────────────────────────────────────────────────── */
function select(id) {
  SEL = ALL_ROLES.find(r => r.id === id) || null;
  renderList();
  renderEditor();
}

/* ── Editor ────────────────────────────────────────────────── */
function renderEditor() {
  const el = document.getElementById('editor');
  if (!SEL) { el.innerHTML = '<div class="editor-empty"><span class="ico">🔐</span><div>Izberi vlogo na levi za urejanje pravic</div></div>'; return; }

  const r      = SEL;
  const locked = r.isAdmin;
  const mySet  = new Set((r.permissions || r.Permissions || []).map(String));

  const cats = {};
  ALL_PERMS.forEach(p => {
    const c = p.category || p.Category || 'Ostalo';
    (cats[c] = cats[c] || []).push(p);
  });

  const matrix = Object.entries(cats).map(([cat, perms]) => `
    <div class="perm-cat">${h(cat)}</div>
    ${perms.map(p => {
      const code = p.code || p.Code;
      const on   = locked || mySet.has(code);
      return `<div class="perm-row">
        <div class="perm-info">
          <div class="perm-label">${h(p.label||p.Label||code)}</div>
          <div class="perm-code">${h(code)}</div>
        </div>
        <label class="tog">
          <input type="checkbox" data-code="${h(code)}" ${on?'checked':''} ${locked?'disabled':''}
            onchange="toggle(this)"/>
          <span class="tog-track"></span>
        </label>
      </div>`;
    }).join('')}`).join('');

  el.innerHTML = `<div class="sk-card-pad">
    ${locked ? `<div class="lock-notice">🔒 Vloga Admin ima vse pravice in jih ni mogoče urejati.</div>` : ''}
    ${!r.isSystem ? `<div class="sk-field" style="margin-bottom:18px;">
      <label>Ime vloge</label>
      <input class="sk-input" id="eName" value="${h(r.name||r.Name)}"/>
    </div>` : `<div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:18px;">${h(r.name||r.Name)}</div>`}
    ${matrix}
    ${!locked ? `<div style="display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
      <button class="sk-btn sk-btn-acc sk-btn-full" id="saveBtn" onclick="save()">✓ Shrani</button>
      ${!r.isSystem ? `<button class="sk-btn sk-btn-red" onclick="del(${r.id})" title="Izbriši vlogo">🗑</button>` : ''}
    </div>` : ''}
  </div>`;
}

function toggle(cb) {
  if (!SEL) return;
  const perms = new Set((SEL.permissions || SEL.Permissions || []).map(String));
  cb.checked ? perms.add(cb.dataset.code) : perms.delete(cb.dataset.code);
  SEL.permissions = [...perms];
  SEL.Permissions = SEL.permissions;
  renderList(); // update pct
}

/* ── Create ────────────────────────────────────────────────── */
async function createRole() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { skToast('Vnesi ime vloge.', 'error'); return; }
  const btn = document.getElementById('createBtn');
  skBtnLoading(btn, true, '+');
  const r = await skPost('/api/Role', { name, permissions: [] });
  skBtnLoading(btn, false, '+');
  if (!r.ok) { skToast(r.data?.message || 'Napaka', 'error'); return; }
  document.getElementById('newName').value = '';
  ALL_ROLES.push(r.data);
  SEL = r.data;
  renderList();
  renderEditor();
  skToast('Vloga ustvarjena!');
}

/* ── Save ──────────────────────────────────────────────────── */
async function save() {
  if (!SEL) return;
  const btn   = document.getElementById('saveBtn');
  const name  = document.getElementById('eName')?.value.trim() || SEL.name || SEL.Name;
  const perms = SEL.permissions || SEL.Permissions || [];
  skBtnLoading(btn, true, '✓ Shrani');
  const r = await skPut(`/api/Role/${SEL.id}`, { name, permissions: perms });
  skBtnLoading(btn, false, '✓ Shrani');
  if (!r.ok) { skToast(r.data?.message || 'Napaka', 'error'); return; }
  const idx = ALL_ROLES.findIndex(x => x.id === SEL.id);
  if (idx >= 0) { ALL_ROLES[idx] = { ...ALL_ROLES[idx], ...r.data, permissions: perms }; SEL = ALL_ROLES[idx]; }
  renderList();
  skToast('Shranjeno!');
}

/* ── Delete ────────────────────────────────────────────────── */
async function del(id) {
  if (!confirm('Izbriši to vlogo? Tega ni mogoče razveljaviti.')) return;
  const r = await skDel(`/api/Role/${id}`);
  if (!r.ok) { skToast(r.data?.message || 'Napaka', 'error'); return; }
  ALL_ROLES = ALL_ROLES.filter(x => x.id !== id);
  SEL = null;
  renderList();
  renderEditor();
  skToast('Vloga izbrisana.', 'warning');
}

function h(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
