<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8"/>
<title>Signalko · Licenca</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="/css/sk.css"/>
<style>
.lic-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
@media(max-width:700px){.lic-grid{grid-template-columns:1fr;}}
.lic-key-wrap{display:flex;align-items:center;gap:10px;background:var(--up);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.lic-key{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--acc);letter-spacing:1px;flex:1;word-break:break-all;}
.lic-copy-btn{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);color:var(--acc);font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:background .13s,border-color .13s;flex-shrink:0;}
.lic-copy-btn:hover{background:rgba(79,142,247,.2);}
.lic-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.lic-stat-num{font-size:32px;font-weight:800;font-family:'Syne',sans-serif;color:var(--txt);}
.lic-stat-label{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
.lic-bar-wrap{margin-top:12px;}
.lic-bar-track{height:6px;background:var(--border);border-radius:6px;overflow:hidden;}
.lic-bar-fill{height:100%;border-radius:6px;background:var(--acc);transition:width .4s;}
.lic-bar-fill.warn{background:var(--org);}
.lic-bar-fill.full{background:var(--red);}
.lic-bar-label{font-size:10px;color:var(--mut);margin-top:5px;}
.lic-meta{font-size:11px;color:var(--mut);}
.lic-meta span{color:var(--sub);}
</style>
</head>
<body>
<div class="sk-layout">
  <aside class="sk-sidebar-col" id="sidebarHost"></aside>
  <main class="sk-main">
    <div class="sk-page-title" data-i18n="page.license">Licenca</div>
    <div class="sk-page-sub" data-i18n="page.license.sub">Licenčni ključ, omejitve in podatki o namestitvi</div>

    <div id="licContent"><div class="sk-state-loading"><div class="sk-spin"></div><span data-i18n="lbl.loading">Nalaganje…</span></div></div>
  </main>
</div>

<script src="/css/i18n.js"></script>
<script src="/css/sk.js"></script>
<script>
skRequirePerm('license.view');

async function load() {
  const r = await skGet('/api/License');
  if (!r.ok) {
    document.getElementById('licContent').innerHTML =
      `<div class="sk-state-empty">${skT('license.error')}</div>`;
    return;
  }
  render(r.data);
}

function render(d) {
  const pctU   = Math.min(100, Math.round((d.activeUsers         / d.maxUsers)         * 100));
  const pctR   = Math.min(100, Math.round((d.activeReadingPoints / d.maxReadingPoints) * 100));
  const clsU   = pctU >= 100 ? 'full' : pctU >= 80 ? 'warn' : '';
  const clsR   = pctR >= 100 ? 'full' : pctR >= 80 ? 'warn' : '';

  document.getElementById('licContent').innerHTML = `
    <div class="sk-card sk-card-pad" style="margin-bottom:16px;">
      <div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;">${skT('license.key_lbl')}</div>
      <div class="lic-key-wrap">
        <div class="lic-key" id="licKey">${h(d.licenseKey)}</div>
        <button class="lic-copy-btn" onclick="copyKey()">${skT('license.copy')}</button>
      </div>
      <div class="lic-meta" style="margin-top:10px;">
        ${d.companyName ? `${skT('license.company')}: <span>${h(d.companyName)}</span> &nbsp;·&nbsp; ` : ''}
        ${skT('license.created')}: <span>${fmt(d.createdAt)}</span> &nbsp;·&nbsp;
        ${skT('license.updated')}: <span>${fmt(d.updatedAt)}</span>
      </div>
    </div>

    <div class="lic-grid">
      <div class="lic-stat">
        <div class="lic-stat-num">${d.activeUsers}</div>
        <div class="lic-stat-label">${skT('license.active_users')}</div>
        <div class="lic-bar-wrap">
          <div class="lic-bar-track"><div class="lic-bar-fill ${clsU}" style="width:${pctU}%"></div></div>
          <div class="lic-bar-label">${d.activeUsers} / ${d.maxUsers} &nbsp;·&nbsp; ${d.maxUsers - d.activeUsers} ${skT('license.free')}</div>
        </div>
      </div>
      <div class="lic-stat">
        <div class="lic-stat-num">${d.totalUsers}</div>
        <div class="lic-stat-label">${skT('license.total_users')}</div>
        <div style="font-size:11px;color:var(--mut);margin-top:10px;">${skT('license.inactive_users')}: ${d.totalUsers - d.activeUsers}</div>
      </div>
      <div class="lic-stat">
        <div class="lic-stat-num">${d.activeReadingPoints}</div>
        <div class="lic-stat-label">${skT('license.reading_points')}</div>
        <div class="lic-bar-wrap">
          <div class="lic-bar-track"><div class="lic-bar-fill ${clsR}" style="width:${pctR}%"></div></div>
          <div class="lic-bar-label">${d.activeReadingPoints} / ${d.maxReadingPoints} &nbsp;·&nbsp; ${d.maxReadingPoints - d.activeReadingPoints} ${skT('license.free')}</div>
        </div>
      </div>
    </div>
  `;
}

function copyKey() {
  const key = document.getElementById('licKey')?.textContent || '';
  navigator.clipboard.writeText(key).then(() => skToast(skT('license.key_copied')));
}

function fmt(dt) {
  const locale = skGetLang ? skGetLang() : 'sl-SI';
  return dt ? new Date(dt).toLocaleString(locale, {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
}
function h(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

SK_I18N_READY.then(load);
</script>
</body>
</html>
