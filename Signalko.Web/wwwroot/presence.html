<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8"/>
<title>Signalko · Moja prisotnost</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/sk.css"/>
<style>
/* ── User header ─────────────────────────────────────────────── */
.my-hdr {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--acc);
  border-radius: var(--radius); padding: 16px 20px; margin-bottom: 22px;
  display: flex; align-items: center; gap: 14px;
}
.my-av {
  width: 42px; height: 42px; border-radius: 9px;
  background: var(--accD); border: 1px solid rgba(79,142,247,.25);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
  color: var(--acc); flex-shrink: 0;
}
.my-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--acc); }
.my-card { font-size: 10px; color: var(--sub); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

/* ── Toolbar ─────────────────────────────────────────────────── */
.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }

/* ── Filters ─────────────────────────────────────────────────── */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
.filter-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
  padding: 7px 10px; font-size: 11px; color: var(--txt); outline: none;
  font-family: 'JetBrains Mono', monospace; transition: border .13s;
}
.filter-input:focus { border-color: var(--acc); }
.filter-input::placeholder { color: var(--mut); }

/* ── Table ───────────────────────────────────────────────────── */
.table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
table.pr-table { width: 100%; border-collapse: collapse; font-size: 11px; }
table.pr-table th {
  background: var(--up); color: var(--sub); font-weight: 600; text-align: left;
  padding: 9px 12px; border-bottom: 1px solid var(--border); white-space: nowrap;
}
table.pr-table td {
  padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--txt);
  white-space: nowrap;
}
table.pr-table tbody tr:last-child td { border-bottom: none; }
table.pr-table tbody tr { transition: background .1s; }
table.pr-table tbody tr:hover td { background: var(--up); }

.badge-in  { display: inline-flex; padding: 2px 10px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; background: rgba(52,211,153,.1); color: var(--grn); border: 1px solid rgba(52,211,153,.2); white-space: nowrap; }
.badge-out { display: inline-flex; padding: 2px 10px; border-radius: 20px; font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; background: rgba(248,113,113,.08); color: var(--red); border: 1px solid rgba(248,113,113,.2); white-space: nowrap; }

/* ── Pager (identical to tags.html) ─────────────────────────── */
.pager-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
.pager { display: flex; gap: 4px; }
.pg-btn {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: 11px; color: var(--txt); cursor: pointer; transition: background .1s;
  font-family: 'JetBrains Mono', monospace;
}
.pg-btn:hover { background: var(--up); }
.pg-btn.active { background: var(--acc); border-color: var(--acc); color: #fff; }
.pg-btn:disabled { opacity: .4; cursor: not-allowed; }
.page-size-sel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 8px; font-size: 11px; color: var(--txt);
  font-family: 'JetBrains Mono', monospace;
}

/* ── States ──────────────────────────────────────────────────── */
.state-empty      { padding: 24px; text-align: center; color: var(--mut); font-size: 11px; }
.state-loading-sm { display: flex; align-items: center; gap: 8px; padding: 16px; color: var(--sub); font-size: 11px; }
@media(max-width:600px){
  .my-hdr { flex-wrap:wrap; }
  .filter-row { gap:6px; }
  table.pr-table { min-width:380px; }
  .pager-bar { gap:6px; }
}
</style>
</head>
<body>
<div class="sk-layout">
  <aside class="sk-sidebar-col" id="sidebarHost"></aside>
  <main class="sk-main">

    <div class="sk-page-title">Moja prisotnost</div>
    <div class="sk-page-sub">Vaša evidenca prihodov in odhodov</div>

    <!-- User header -->
    <div class="my-hdr">
      <div class="my-av" id="myAv">?</div>
      <div>
        <div class="my-name" id="myName">—</div>
        <div class="my-card" id="myCard"></div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="sk-btn" id="btnRefresh" onclick="load(pg)">↺ Osveži</button>
      <button class="sk-btn" onclick="clearF()">✕ Počisti filtre</button>
      <span style="margin-left:auto;font-size:11px;color:var(--mut);">Skupaj: <span id="totalCount">—</span></span>
    </div>

    <!-- Filters -->
    <div class="filter-row">
      <select class="filter-input" id="fType" onchange="load(1)">
        <option value="">— tip: vsi —</option>
        <option value="IN">▲ Prihod (IN)</option>
        <option value="OUT">▼ Odhod (OUT)</option>
      </select>
      <input class="filter-input" type="date" id="fFrom" onchange="load(1)" style="color-scheme:dark;" title="Od datuma"/>
      <input class="filter-input" type="date" id="fTo"   onchange="load(1)" style="color-scheme:dark;" title="Do datuma"/>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="pr-table">
        <thead>
          <tr>
            <th style="width:110px;">Tip</th>
            <th>Čas</th>
            <th>Cona</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="3"><div class="state-loading-sm"><div class="sk-spin"></div>Nalaganje…</div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pager -->
    <div class="pager-bar">
      <div style="font-size:11px;color:var(--mut);">Stran <span id="pageInfo">1</span></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="pager" id="pager"></div>
        <select class="page-size-sel" id="pageSize" onchange="onPageSizeChange()">
          <option>10</option><option>20</option><option selected>50</option><option>100</option>
        </select>
      </div>
    </div>

  </main>
</div>
<script src="/css/sk.js"></script>
<script>
skRequireLogin();

let pg       = 1;
let pgSize   = 50;
let debTimer = null;

/* ── Fill user header ────────────────────────────────────────── */
(function() {
  const cu = skCurrentUser();
  if (!cu) return;
  const name = ((cu.name||cu.Name||'') + ' ' + (cu.surname||cu.Surname||'')).trim();
  const ini  = [(cu.name||cu.Name||'')[0], (cu.surname||cu.Surname||'')[0]]
                .filter(Boolean).join('').toUpperCase() || '?';
  document.getElementById('myAv').textContent   = ini;
  document.getElementById('myName').textContent = name || '—';
  document.getElementById('myCard').textContent = (cu.cardID||cu.CardID) ? '🪪 ' + (cu.cardID||cu.CardID) : '';
})();

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDt(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('sl-SI', {day:'2-digit',month:'2-digit',year:'numeric'})
    + ' ' + d.toLocaleTimeString('sl-SI', {hour:'2-digit',minute:'2-digit'});
}

/* ── Load ────────────────────────────────────────────────────── */
async function load(page) {
  page = Math.max(1, page||1);
  pg   = page;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="3"><div class="state-loading-sm"><div class="sk-spin"></div>Nalaganje…</div></td></tr>';

  const p    = new URLSearchParams({ page, pageSize: pgSize });
  const type = document.getElementById('fType').value;
  const from = document.getElementById('fFrom').value;
  const to   = document.getElementById('fTo').value;
  if (type) p.set('type', type);
  if (from) p.set('from', from);
  if (to)   p.set('to', to + 'T23:59:59');

  const r = await skGet('/api/Presence/me?' + p);
  if (!r.ok) {
    tbody.innerHTML = `<tr><td colspan="3"><div class="state-empty" style="color:var(--red);">Napaka (${r.status}).</div></td></tr>`;
    return;
  }

  const { items=[], total=0, pageSize=pgSize } = r.data;
  document.getElementById('totalCount').textContent = total;

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="3"><div class="state-empty">Ni zapisov za izbrane filtre.</div></td></tr>';
  } else {
    tbody.innerHTML = items.map(e => `
      <tr>
        <td>${e.type==='IN' ? '<span class="badge-in">▲ IN</span>' : '<span class="badge-out">▼ OUT</span>'}</td>
        <td style="font-family:'JetBrains Mono',monospace;color:var(--sub);">${fmtDt(e.scannedAt)}</td>
        <td style="color:var(--sub);">${esc(e.zone||'—')}</td>
      </tr>`).join('');
  }

  renderPager(total, page, pageSize);
}

/* ── Pager (same as tags.html) ───────────────────────────────── */
function renderPager(total, page, pageSize) {
  const pages = Math.max(1, Math.ceil(total / pageSize));
  document.getElementById('pageInfo').textContent = `${page} / ${pages}`;
  const pager = document.getElementById('pager');
  pager.innerHTML = '';

  const add = (label, p, active, disabled) => {
    const btn = document.createElement('button');
    btn.className = 'pg-btn' + (active ? ' active' : '');
    btn.disabled  = disabled;
    btn.textContent = label;
    btn.onclick = () => load(p);
    pager.appendChild(btn);
  };

  add('«', Math.max(1, page-1), false, page === 1);
  const w = 2, s = Math.max(1, page-w), e = Math.min(pages, page+w);
  for (let i = s; i <= e; i++) add(String(i), i, i === page, false);
  add('»', Math.min(pages, page+1), false, page === pages);
}

function onPageSizeChange() {
  pgSize = parseInt(document.getElementById('pageSize').value, 10) || 50;
  pg = 1;
  load(1);
}

function clearF() {
  document.getElementById('fType').value = '';
  document.getElementById('fFrom').value = '';
  document.getElementById('fTo').value   = '';
  load(1);
}

document.addEventListener('DOMContentLoaded', () => load(1));
</script>
</body>
</html>
