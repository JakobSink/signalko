<!-- Signalko Sidebar -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --sb-bg:       #10131a;
    --sb-surface:  #161b25;
    --sb-border:   #1e2535;
    --sb-accent:   #4f8ef7;
    --sb-accent-d: rgba(79,142,247,.09);
    --sb-red:      #f87171;
    --sb-grn:      #34d399;
    --sb-org:      #fb923c;
    --sb-text:     #e8edf5;
    --sb-sub:      #8897b0;
    --sb-muted:    #4a5568;
  }

  .sb {
    display: flex; flex-direction: column; height: 100vh;
    background: var(--sb-bg); border-right: 1px solid var(--sb-border);
    font-family: 'JetBrains Mono', monospace; overflow: hidden;
  }

  .sb-brand {
    padding: 20px 16px 14px; border-bottom: 1px solid var(--sb-border); flex-shrink: 0;
  }
  .sb-brand-name {
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
    letter-spacing: -1px; color: var(--sb-text); line-height: 1;
    text-decoration: none; display: block;
  }
  .sb-brand-name span { color: var(--sb-accent); }
  .sb-brand-sub { font-size: 9px; color: var(--sb-muted); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 4px; }

  .sb-nav {
    flex: 1; padding: 10px 8px; display: flex; flex-direction: column;
    gap: 2px; overflow-y: auto; min-height: 0;
  }

  .sb-push { flex: 1; }

  .sb-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; text-decoration: none; font-size: 12px; font-weight: 400;
    color: var(--sb-sub); transition: background .13s, color .13s; border: 1px solid transparent;
  }
  .sb-item:hover { background: var(--sb-surface); color: var(--sb-text); }
  .sb-item.active {
    background: var(--sb-accent-d); border-color: rgba(79,142,247,.2);
    color: var(--sb-accent); font-weight: 600;
  }
  .sb-item.admin-link { color: var(--sb-org); }
  .sb-item.admin-link:hover { color: var(--sb-org); background: rgba(251,146,60,.08); }
  .sb-item.admin-link.active { background: rgba(251,146,60,.1); border-color: rgba(251,146,60,.25); }

  .sb-item.pres-link { color: var(--sb-accent); }
  .sb-item.pres-link:hover { color: var(--sb-accent); background: var(--sb-accent-d); }
  .sb-item.pres-link.active { background: var(--sb-accent-d); border-color: rgba(79,142,247,.25); color: var(--sb-accent); }

  .sb-item-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .sb-label { flex: 1; }

  .sb-section {
    font-size: 9px; color: var(--sb-muted); letter-spacing: 2px;
    text-transform: uppercase; padding: 12px 20px 6px;
  }

  .sb-divider { height: 1px; background: var(--sb-border); margin: 6px 8px; flex-shrink: 0; }

  .sb-profile-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; border: 1px solid var(--sb-border);
    background: var(--sb-surface); flex-shrink: 0;
  }
  .sb-avatar {
    width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
    background: var(--sb-accent-d); border: 1px solid rgba(79,142,247,.25);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800;
    color: var(--sb-accent);
  }
  .sb-profile-info { min-width: 0; flex: 1; }
  .sb-profile-name {
    font-size: 12px; font-weight: 600; color: var(--sb-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sb-profile-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .sb-profile-card { font-size: 10px; color: var(--sb-sub); }
  .sb-role-badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
    background: rgba(251,146,60,.15); border: 1px solid rgba(251,146,60,.3); color: var(--sb-org);
  }
  .sb-role-badge.user-role {
    background: rgba(79,142,247,.1); border-color: rgba(79,142,247,.25); color: var(--sb-accent);
  }
  .sb-logout-btn {
    background: none; border: none; cursor: pointer; padding: 4px 6px;
    color: var(--sb-muted); font-size: 13px; border-radius: 5px; flex-shrink: 0;
    transition: color .13s, background .13s;
  }
  .sb-logout-btn:hover { color: var(--sb-red); background: rgba(248,113,113,.1); }

</style>

<div class="sb">
  <div class="sb-brand">
    <a class="sb-brand-name" href="/index.html">signal<span>ko</span></a>
    <div class="sb-brand-sub">RFID Management</div>
  </div>

  <nav class="sb-nav" id="sbNav">
    <a class="sb-item" href="/index.html">
      <span class="sb-item-icon">◈</span>
      <span class="sb-label">Pregled</span>
    </a>
    <a class="sb-item" href="/loans.html">
      <span class="sb-item-icon">⇌</span>
      <span class="sb-label">Izposoja</span>
    </a>
    <a class="sb-item" href="/assets.html">
      <span class="sb-item-icon">▣</span>
      <span class="sb-label">Sredstva</span>
    </a>
    <a class="sb-item" href="/tags.html">
      <span class="sb-item-icon">◉</span>
      <span class="sb-label">RFID Tagi</span>
    </a>

    <div class="sb-section" id="sbUserSection" style="display:none;">Uporabnik</div>
    <a class="sb-item pres-link" id="sbPresLink" href="/presence.html" style="display:none;">
      <span class="sb-item-icon">◎</span>
      <span class="sb-label">Prisotnost</span>
    </a>

    <div class="sb-section" id="sbAdminSection" style="display:none;">Admin</div>
    <a class="sb-item admin-link" id="sbAdminLink" href="/admin.html" style="display:none;">
      <span class="sb-item-icon">⚙</span>
      <span class="sb-label">Uporabniki</span>
    </a>
    <a class="sb-item admin-link" id="sbPresAdminLink" href="/presenceadmin.html" style="display:none;">
      <span class="sb-item-icon">◎</span>
      <span class="sb-label">Prisotnost — nadzor</span>
    </a>

    <div class="sb-section" id="sbConfigSection" style="display:none;">Konfiguracija</div>
    <a class="sb-item" id="sbReadersLink"  href="/readers.html"  style="display:none;">
      <span class="sb-item-icon">⊡</span>
      <span class="sb-label">Čitalci</span>
    </a>
    <a class="sb-item" id="sbAntennasLink" href="/antennas.html" style="display:none;">
      <span class="sb-item-icon">⊛</span>
      <span class="sb-label">Antene</span>
    </a>
    <a class="sb-item" id="sbZonesLink"    href="/zones.html"    style="display:none;">
      <span class="sb-item-icon">⊞</span>
      <span class="sb-label">Cone</span>
    </a>

    <div class="sb-push"></div>
    <div class="sb-divider"></div>
    <div id="sbProfileLabel"></div>
    <div id="sbProfile"></div>
  </nav>
</div>

<script>
(function() {
  var path = location.pathname.toLowerCase();

  // ── Mark active — desktop sidebar ──
  document.querySelectorAll('#sbNav .sb-item').forEach(function(a) {
    var href = (a.getAttribute('href') || '').toLowerCase();
    if (href && (path.endsWith(href) ||
        (href !== '/index.html' && path.includes(href.replace(/\.html/, ''))))) {
      a.classList.add('active');
    }
  });

  // ── Inject hamburger + backdrop + slide-down menu ──
  if (!document.getElementById('sk-ham-btn')) {
    // Hamburger button
    var hamBtn = document.createElement('button');
    hamBtn.id = 'sk-ham-btn';
    hamBtn.setAttribute('aria-label', 'Odpri meni');
    hamBtn.innerHTML = '☰';
    hamBtn.onclick = function() { skMenuToggle(); };
    document.body.appendChild(hamBtn);

    // Backdrop
    var backdrop = document.createElement('div');
    backdrop.id = 'sk-mob-backdrop';
    backdrop.onclick = function() { skMenuClose(); };
    document.body.appendChild(backdrop);

    // Slide-down menu
    var menu = document.createElement('nav');
    menu.id = 'sk-mobile-menu';
    menu.innerHTML =
      '<div class="smm-head">' +
        '<a class="smm-brand" href="/index.html">signal<span>ko</span></a>' +
        '<button class="smm-close" onclick="skMenuClose()">✕</button>' +
      '</div>' +
      '<div class="smm-nav-wrap">' +
        '<a class="smm-item" href="/index.html"><span class="smm-item-icon">◈</span> Pregled</a>' +
        '<a class="smm-item" href="/loans.html"><span class="smm-item-icon">⇌</span> Izposoja</a>' +
        '<a class="smm-item" href="/assets.html"><span class="smm-item-icon">▣</span> Sredstva</a>' +
        '<a class="smm-item" href="/tags.html"><span class="smm-item-icon">◉</span> RFID Tagi</a>' +
        '<div class="smm-section" id="smmUserSection" style="display:none">Uporabnik</div>' +
        '<a class="smm-item smm-pres" href="/presence.html" id="smmPresLink" style="display:none"><span class="smm-item-icon">◎</span> Prisotnost</a>' +
        '<div class="smm-section" id="smmAdminSection" style="display:none">Admin</div>' +
        '<a class="smm-item smm-admin" href="/admin.html" id="smmAdminLink" style="display:none"><span class="smm-item-icon">⚙</span> Uporabniki</a>' +
        '<a class="smm-item smm-admin" href="/presenceadmin.html" id="smmPresAdminLink" style="display:none"><span class="smm-item-icon">◎</span> Prisotnost — nadzor</a>' +
        '<div class="smm-section" id="smmConfigSection" style="display:none">Konfiguracija</div>' +
        '<a class="smm-item" href="/readers.html" id="smmReadersLink" style="display:none"><span class="smm-item-icon">⊡</span> Čitalci</a>' +
        '<a class="smm-item" href="/antennas.html" id="smmAntennasLink" style="display:none"><span class="smm-item-icon">⊛</span> Antene</a>' +
        '<a class="smm-item" href="/zones.html" id="smmZonesLink" style="display:none"><span class="smm-item-icon">⊞</span> Cone</a>' +
      '</div>' +
      '<div class="smm-divider"></div>' +
      '<div class="smm-profile-wrap" id="smmProfile"></div>';
    document.body.appendChild(menu);

    // Mark active items in mobile menu
    menu.querySelectorAll('.smm-item').forEach(function(a) {
      var href = (a.getAttribute('href') || '').toLowerCase();
      if (href && (path.endsWith(href) ||
          (href !== '/index.html' && path.includes(href.replace(/\.html/, ''))))) {
        a.classList.add('active');
      }
    });
  }

  // ── Menu open/close ──
  window.skMenuOpen = function() {
    document.getElementById('sk-mobile-menu').classList.add('sk-menu-open');
    document.getElementById('sk-mob-backdrop').style.display = 'block';
    document.body.style.overflow = 'hidden';
  };
  window.skMenuClose = function() {
    document.getElementById('sk-mobile-menu').classList.remove('sk-menu-open');
    document.getElementById('sk-mob-backdrop').style.display = 'none';
    document.body.style.overflow = '';
  };
  window.skMenuToggle = function() {
    if (document.getElementById('sk-mobile-menu').classList.contains('sk-menu-open'))
      skMenuClose();
    else skMenuOpen();
  };

  // ── Auth state ──
  var token = localStorage.getItem('token') || localStorage.getItem('sk_token');
  var cached = null;
  try { cached = JSON.parse(localStorage.getItem('sk_user') || 'null'); } catch {}

  // ── Render both desktop sidebar + mobile menu ──
  function render(user) {
    var loggedIn = !!(token && user);
    var isAdmin  = loggedIn && (
      user.roleId == 1 || user.RoleId == 1 ||
      user.role === 'Admin' || user.roleName === 'Admin' || user.RoleName === 'Admin'
    );

    // Desktop: user section
    ['sbUserSection','sbPresLink'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = loggedIn ? '' : 'none';
    });
    // Desktop: admin section
    ['sbAdminSection','sbAdminLink','sbPresAdminLink','sbConfigSection',
     'sbReadersLink','sbAntennasLink','sbZonesLink'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = isAdmin ? '' : 'none';
    });

    // Mobile menu: user section
    ['smmUserSection','smmPresLink'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = loggedIn ? '' : 'none';
    });
    // Mobile menu: admin section
    ['smmAdminSection','smmAdminLink','smmPresAdminLink','smmConfigSection',
     'smmReadersLink','smmAntennasLink','smmZonesLink'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.style.display = isAdmin ? '' : 'none';
    });

    // Desktop: profile label
    var labelEl = document.getElementById('sbProfileLabel');
    if (labelEl) {
      labelEl.innerHTML = loggedIn
        ? '<div class="sb-section" style="padding:8px 12px 4px;">Profil</div>'
        : '<a href="/login.html" class="sb-section" style="padding:8px 12px 4px;display:block;text-decoration:none;color:var(--sb-accent);">Profil</a>';
    }

    // Desktop: profile block
    var profileEl = document.getElementById('sbProfile');
    if (profileEl) {
      if (loggedIn) {
        var name     = user.name    || user.Name    || '';
        var surname  = user.surname || user.Surname || '';
        var card     = user.cardID  || user.CardID  || '';
        var role     = user.roleName|| user.RoleName|| user.role || user.Role || '';
        var initials = [name[0], surname[0]].filter(Boolean).join('').toUpperCase() || '?';
        var fullName = [name, surname].filter(Boolean).join(' ') || '—';
        var roleClass = isAdmin ? 'admin-role' : 'user-role';
        profileEl.innerHTML =
          '<a class="sb-item" href="/profile.html" style="border-color:var(--sb-border);background:var(--sb-surface);text-decoration:none;">' +
            '<div class="sb-avatar">' + initials + '</div>' +
            '<div class="sb-profile-info">' +
              '<div class="sb-profile-name">' + fullName + '</div>' +
              '<div class="sb-profile-meta">' +
                (card ? '<span class="sb-profile-card">🪪 ' + card + '</span>' : '') +
                (role ? '<span class="sb-role-badge ' + roleClass + '">' + role + '</span>' : '') +
              '</div>' +
            '</div>' +
          '</a>';
      } else {
        profileEl.innerHTML =
          '<a class="sb-item" href="/login.html" style="color:var(--sb-accent);border-color:rgba(79,142,247,.2);background:var(--sb-accent-d);">' +
            '<span class="sb-item-icon">⟶</span>' +
            '<span class="sb-label">Prijava / Registracija</span>' +
          '</a>';
      }
    }

    // Mobile menu: profile block
    var smmProfile = document.getElementById('smmProfile');
    if (smmProfile) {
      if (loggedIn) {
        var mName     = user.name    || user.Name    || '';
        var mSurname  = user.surname || user.Surname || '';
        var mCard     = user.cardID  || user.CardID  || '';
        var mRole     = user.roleName|| user.RoleName|| user.role || user.Role || '';
        var mInitials = [mName[0], mSurname[0]].filter(Boolean).join('').toUpperCase() || '?';
        var mFullName = [mName, mSurname].filter(Boolean).join(' ') || '—';
        smmProfile.innerHTML =
          '<a class="smm-item" href="/profile.html" style="gap:12px;">' +
            '<div style="width:34px;height:34px;border-radius:8px;background:var(--accD);border:1px solid rgba(79,142,247,.25);display:flex;align-items:center;justify-content:center;font-family:\'Syne\',sans-serif;font-size:13px;font-weight:800;color:var(--acc);flex-shrink:0;">' + mInitials + '</div>' +
            '<div style="flex:1;min-width:0;">' +
              '<div style="font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + mFullName + '</div>' +
              '<div style="font-size:10px;color:var(--sub);">' + (mCard ? '🪪 ' + mCard : '') + (mRole ? ' · ' + mRole : '') + '</div>' +
            '</div>' +
          '</a>' +
          '<a class="smm-item" href="/login.html" onclick="localStorage.removeItem(\'token\');localStorage.removeItem(\'sk_token\');localStorage.removeItem(\'sk_user\');" style="color:var(--sb-red);margin-top:4px;">' +
            '<span class="smm-item-icon">⟵</span> Odjava' +
          '</a>';
      } else {
        smmProfile.innerHTML =
          '<a class="smm-item" href="/login.html" style="color:var(--acc);">' +
            '<span class="smm-item-icon">⟶</span> Prijava / Registracija' +
          '</a>';
      }
    }
  }

  render(cached);

  // Refresh from server
  if (token && cached && cached.id) {
    fetch('/api/User/' + cached.id, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
    })
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(fresh) {
      if (!fresh) return;
      var updated = {
        id:       fresh.id       || fresh.Id       || cached.id,
        name:     fresh.name     || fresh.Name     || cached.name,
        surname:  fresh.surname  || fresh.Surname  || cached.surname,
        email:    fresh.email    || fresh.Email    || cached.email,
        cardID:   fresh.cardID   || fresh.CardID   || cached.cardID,
        roleId:   fresh.roleId   || fresh.RoleId   || null,
        roleName: fresh.roleName || fresh.RoleName || null,
        role:     fresh.role     || fresh.Role     || null,
      };
      localStorage.setItem('sk_user', JSON.stringify(updated));
      render(updated);
    })
    .catch(function() {});
  }
})();
</script>
